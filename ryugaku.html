<!DOCTYPE html>
<html lang="ja">
<head>

  <link rel="stylesheet" href="hobby-common.css">
  <link rel="stylesheet" href="dark-mode.css">
  <script src="dark-mode.js"></script>
  <style>
    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 600px) {
      .photo-grid {
        grid-template-columns: 1fr;
      }
    }

    .photo-item img {
      width: 100%;
      border-radius: 8px;
      object-fit: cover;
      aspect-ratio: 4 / 3;
      display: block;
    }

    .photo-caption {
      font-size: 0.78rem;
      color: #7aabbf;
      text-align: center;
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container hobby-container">
    <nav class="site-nav">
      <a href="index.html">トップ</a>

      <a href="hobbies.html">趣味</a>
      <a href="index.html#likes">好きなもの</a>
    </nav>

    <p class="hobby-lead">スペイン・バスク地方での留学中に訪れた場所たち。人生で一番濃い時間でした。</p>

    <div class="photo-grid">
      <div class="photo-item">
        <img src="IMG_5268.jpg" alt="家から徒歩５分のビーチ">
        <p class="photo-caption">家から徒歩５分のビーチ</p>
      </div>
      <div class="photo-item">

      <div class="photo-item">
        <img src="IMG_8056.png" alt="サグラダファミリア">

      </div>
      <div class="photo-item">
        <img src="IMG_1583.jpg" alt="一生忘れないスイスの絶景！">
